name: test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust Toolchain
        uses: "dtolnay/rust-toolchain@v1"
        with:
          toolchain: stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo test
        run: cargo test
